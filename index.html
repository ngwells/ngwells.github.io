<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nathan Wells</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: #111;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
        }

        .hamburger {
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
            z-index: 10000; /* stays above panel */
        }

        nav .brand {
            font-size: 1.3rem;
            font-weight: 600;
            margin-left: auto; /* pushes name to the right */
        }

        /* SIDE PANEL */
        .side-panel {
            position: fixed;
            top: 0;
            left: -300px; /* fully hidden */
            width: 260px;
            height: 100%;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            transition: left 0.3s ease;
            box-shadow: 3px 0 10px rgba(0,0,0,0.4);
            z-index: 9999;
        }

        .side-panel.open {
            left: 0; /* slide in */
        }

        .close-btn {
            font-size: 1.6rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* LINK LIST (no accordion) */
        .link-list a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 0;
            font-size: 1.1rem;
        }

        .link-list a:hover {
            text-decoration: underline;
        }

        /* HERO SECTION */
        .hero {
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>

<body>

    <nav>
        <div class="hamburger" onclick="togglePanel()">☰</div>
        <div class="brand">Nathan Wells</div>
    </nav>

    <!-- SIDE PANEL -->
    <div id="sidePanel" class="side-panel">
        <div class="close-btn" onclick="togglePanel()">✕</div>

        <div class="link-list">
            <a href="Patents/">Patents</a>
            <a href="projects/">projects</a>
            <a href="Trading/">Trading</a>
        </div>
    </div>

    <section class="hero">
        <h1>Welcome</h1>
        <p>This is my personal GitHub Pages site.</p>
    </section>

    <script>
        function togglePanel() {
            document.getElementById("sidePanel").classList.toggle("open");
        }
    </script>

</body>
</html>
