<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nathan Wells</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: #111;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .brand {
            font-size: 1.3rem;
            font-weight: 600;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav li {
            position: relative;
            cursor: pointer;
            font-size: 1.8rem; /* hamburger size */
            user-select: none;
        }

        /* DROPDOWN */
        nav li ul {
            display: none;
            position: absolute;
            top: 35px;
            right: 0;
            background: #222;
            padding: 10px 0;
            border-radius: 4px;
            min-width: 150px;
        }

        nav li:hover ul {
            display: block;
        }

        nav li ul li {
            padding: 8px 20px;
            white-space: nowrap;
            font-size: 1rem;
        }

        nav li ul li:hover {
            background: #333;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        /* HERO SECTION */
        .hero {
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>

<body>

    <nav>
        <div class="brand">Nathan Wells</div>

        <ul>
            <li class="hamburger">
                ☰
                <ul>
                    <li><a href="Patents/">Patents</a></li>
                    <li><a href="Projects/">Projects</a></li>
                    <li><a href="Trading/">Trading</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Welcome</h1>
        <p>This is my personal GitHub Pages site.</p>
    </section>

</body>
</html>
