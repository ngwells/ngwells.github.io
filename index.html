<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nathan Wells</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: #111;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
        }

        .hamburger {
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
            z-index: 10000; /* stays above panel */
        }

        nav .brand {
            font-size: 1.3rem;
            font-weight: 600;
            margin-left: auto; /* pushes name to the right */
        }

        /* SIDE PANEL */
        .side-panel {
            position: fixed;
            top: 0;
            left: -260px; /* hidden by default */
            width: 260px;
            height: 100%;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            transition: left 0.3s ease;
            box-shadow: 3px 0 10px rgba(0,0,0,0.4);
            z-index: 9999;
        }

        .side-panel.open {
            left: 0; /* slide in */
        }

        .close-btn {
            font-size: 1.6rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* ACCORDION */
        .accordion-item {
            margin-bottom: 10px;
        }

        .accordion-header {
            background: #222;
            padding: 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1.1rem;
        }

        .accordion-content {
            display: none;
            background: #333;
            padding: 10px 15px;
            border-radius: 4px;
            margin-top: 5px;
        }

        .accordion-content a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 6px 0;
        }

        .accordion-content a:hover {
            text-decoration: underline;
        }

        /* HERO SECTION */
        .hero {
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>

<body>

    <nav>
        <div class="hamburger" onclick="togglePanel()">☰</div>
        <div class="brand">Nathan Wells</div>
    </nav>

    <!-- SIDE PANEL -->
    <div id="sidePanel" class="side-panel">
        <div class="close-btn" onclick="togglePanel()">✕</div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">Menu</div>
            <div class="accordion-content">
                <a href="Patents/">Patents</a>
                <a href="Projects/">Projects</a>
                <a href="Trading/">Trading</a>
            </div>
        </div>
    </div>

    <section class="hero">
        <h1>Welcome</h1>
        <p>This is my personal GitHub Pages site.</p>
    </section>

    <script>
        function togglePanel() {
            document.getElementById("sidePanel").classList.toggle("open");
        }

        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            content.style.display = content.style.display === "block" ? "none" : "block";
        }
    </script>

</body>
</html>
