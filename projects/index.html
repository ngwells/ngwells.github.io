<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fafafa;
        color: #222;
    }

    header {
        text-align: center;
        padding: 40px 20px;
    }

    header h1 {
        font-size: 2.6rem;
        margin-bottom: 10px;
    }

    .gallery-grid {
        display: grid;
        gap: 30px;
        padding: 20px 40px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .gallery-item {
        background: white;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .gallery-item:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 22px rgba(0,0,0,0.12);
    }

    .gallery-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        display: block;
    }

    .gallery-item .content {
        padding: 20px;
    }

    .gallery-item h2 {
        margin-top: 0;
        font-size: 1.4rem;
    }

    .gallery-item p {
        color: #444;
        line-height: 1.5;
        margin-bottom: 0;
    }
</style>
</head>

<body>

<header>
    <h1>Projects</h1>
    <p>A responsive image‑first layout with descriptions.</p>
</header>

<section class="gallery-grid">

    <!-- Project 1 -->
    <div class="gallery-item">
        <img src="mistralshatbot.jpg" alt="Project 1">
        <div class="content">
            <h2>Mistral Chatbot</h2>
            <p>
                Quite and easy website using python and html syntax with the Mistral API. The site is stored in Github and deployed at Render.com (if its deployed). Have a convo with the LLM.
            </p>
        </div>
    </div>
